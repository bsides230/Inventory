<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Viewer - Ordering App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { brand: { primary: '#db594b' } },
                    fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="/style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[var(--color-bg-body)] text-[var(--color-text-primary)] font-sans antialiased min-h-screen flex flex-col">

    <!-- Header -->
    <header class="bg-[var(--color-bg-nav)] border-b border-[var(--color-border)] p-3 sticky top-0 z-40 shadow-md">
        <div class="flex justify-between items-center max-w-4xl mx-auto w-full gap-3">
            <div class="flex items-center gap-2 min-w-0">
                <a href="/admin" class="p-2 text-[var(--color-text-secondary)] hover:text-[var(--color-text-primary)] transition-colors rounded-lg active:bg-[var(--color-border)] shrink-0" title="Back to Admin" aria-label="Back to Admin">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </a>
                <div class="min-w-0">
                    <div class="flex items-center gap-2">
                        <h1 class="display-serif text-lg font-bold text-[var(--text-head)] truncate">Order Viewer</h1>
                    </div>
                </div>
            </div>

            <div class="flex items-center gap-2 shrink-0">
                <!-- Order Selector Dropdown -->
                <div class="relative">
                    <button id="btnOrderSelector" onclick="toggleOrderDropdown()" class="flex items-center gap-1.5 bg-[var(--border-color)] hover:bg-[var(--border-color)] text-[var(--text-head)] text-sm rounded-lg px-3 py-2 transition-colors max-w-[200px]" title="Select Order">
                        <i data-lucide="clipboard-list" class="w-4 h-4 shrink-0"></i>
                        <span id="currentOrderName" class="truncate mono">Select Order...</span>
                        <i data-lucide="chevron-down" class="w-3 h-3 shrink-0"></i>
                    </button>
                    <div id="orderDropdown" class="hidden absolute right-0 top-full mt-1 bg-[var(--bg-panel)] border border-[var(--border-color)] rounded-xl shadow-xl z-50 min-w-[240px] max-h-60 overflow-y-auto">
                        <div id="orderList" class="py-1">
                            <div class="px-4 py-2 text-sm text-[var(--color-text-secondary)]">Loading...</div>
                        </div>
                    </div>
                </div>

                <!-- Language Toggle -->
                <div class="relative">
                    <button id="btnToggleLangApp" class="p-2 text-[var(--color-text-secondary)] hover:text-[var(--color-text-primary)] transition-colors rounded-lg active:bg-[var(--color-border)]" title="Language" aria-label="Language" onclick="document.getElementById('langDropdown').classList.toggle('hidden')">
                        <i data-lucide="languages" class="w-5 h-5"></i>
                    </button>
                    <div id="langDropdown" class="hidden absolute right-0 top-full mt-1 bg-[var(--bg-panel)] border border-[var(--border-color)] rounded-xl shadow-xl z-50 min-w-[140px] py-1">
                        <button onclick="setLanguage('en'); document.getElementById('langDropdown').classList.add('hidden')" class="lang-option w-full text-left px-4 py-2 text-sm hover:bg-[var(--border-color)] transition-colors flex items-center gap-2" data-lang="en">
                            🇺🇸 English
                        </button>
                        <button onclick="setLanguage('es'); document.getElementById('langDropdown').classList.add('hidden')" class="lang-option w-full text-left px-4 py-2 text-sm hover:bg-[var(--border-color)] transition-colors flex items-center gap-2" data-lang="es">
                            🇲🇽 Español
                        </button>
                    </div>
                </div>

                <!-- Theme Toggle -->
                <button id="btnToggleTheme" class="p-2 text-[var(--color-text-secondary)] hover:text-[var(--color-text-primary)] transition-colors rounded-lg active:bg-[var(--color-border)]" title="Toggle Theme" aria-label="Toggle Theme" onclick="toggleTheme()">
                    <i data-lucide="moon" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Content -->
    <main class="flex-1 max-w-4xl w-full mx-auto p-4 md:p-6 space-y-6">
        <div id="noOrderSelectedState" class="text-center text-[var(--color-text-secondary)] py-12">
            <i data-lucide="clipboard-list" class="w-12 h-12 mx-auto mb-4 opacity-50"></i>
            <p>Please select an order from the dropdown menu above.</p>
        </div>

        <div id="orderContentArea" class="hidden">
            <div class="admin-card">
                <div class="flex items-center justify-between mb-4 pb-4 border-b border-[var(--color-border)]">
                    <div>
                        <div class="flex items-center gap-2 mb-1">
                            <h2 id="viewOrderLocation" class="text-xl font-bold text-[var(--color-text-primary)]">Location Name</h2>
                            <span id="viewOrderRushBadge" class="hidden bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full font-bold uppercase tracking-wide">Rush Order</span>
                        </div>
                        <div class="text-xs text-[var(--color-text-secondary)] flex items-center gap-2">
                            <span><i data-lucide="clock" class="w-3 h-3 inline"></i> <span id="viewOrderDate">Date</span></span>
                            <span id="viewOrderNeededByContainer" class="hidden"><i data-lucide="calendar" class="w-3 h-3 inline ml-2"></i> Needed by: <span id="viewOrderNeededBy" class="text-[var(--color-text-primary)]">Date</span></span>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="text-xs text-[var(--color-text-secondary)] uppercase font-bold tracking-wider mb-1">Total</div>
                        <div id="viewOrderTotal" class="text-2xl font-bold text-green-500">$0.00</div>
                    </div>
                </div>

                <div id="viewOrderItems" class="space-y-2 mb-6">
                    <!-- Items rendered here -->
                </div>

                <div class="flex justify-end pt-4 border-t border-[var(--color-border)]">
                    <button id="btnDeleteOrder" class="text-red-500 hover:text-white hover:bg-red-500 px-4 py-2 rounded transition-colors text-sm flex items-center gap-2">
                        <i data-lucide="trash-2" class="w-4 h-4"></i> Delete Order
                    </button>
                </div>
            </div>
        </div>
    </main>

    <script src="/viewer.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
