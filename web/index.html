<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title id="htmlTitle">Falcone's Pizza Inventory</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32.png">

    <!-- Tailwind CSS (via CDN like RemoDash) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        falcone: {
                            red: '#db594b',
                            dark: '#0a0a0a',
                            light: '#f2f2f2',
                            gray: '#1f1f1f'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css">

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>

    <!-- Heroicons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-falcone-dark text-white font-sans antialiased select-none h-screen flex flex-col overflow-hidden">

    <!-- App Header -->
    <header class="bg-falcone-gray border-b border-gray-800 p-4 sticky top-0 z-40 shadow-md">
        <div class="flex justify-between items-center max-w-4xl mx-auto w-full">
            <div class="flex items-center gap-3">
                <button id="btnBack" class="p-2 text-gray-400 hover:text-white hidden transition-colors rounded-lg active:bg-gray-800">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
                <h1 class="text-xl font-bold text-white tracking-tight" id="appTitle">Inventory</h1>
            </div>

            <div class="flex items-center gap-4">
                <button id="btnSubmitOrder" class="bg-falcone-red hover:bg-red-600 text-white font-bold py-2 px-4 rounded-lg shadow-lg transition-colors flex items-center gap-2 text-sm">
                    <i data-lucide="shopping-cart" class="w-4 h-4"></i>
                    <span id="labelSubmitOrder">Submit Order</span>
                </button>

                <button id="btnToggleLangApp" class="p-2 text-gray-400 hover:text-white transition-colors rounded-lg active:bg-gray-800" title="Toggle Language">
                    <i data-lucide="languages" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-20 no-scrollbar">
        <div class="max-w-4xl mx-auto">

            <!-- Dashboard View (Category Grid) -->
            <div id="dashboardView" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-4 md:gap-6 pb-8">
                <!-- Injected via JS -->
            </div>

            <!-- Category View (Item List) -->
            <div id="categoryView" class="hidden pb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="categoryTitle" class="text-2xl font-bold text-falcone-red capitalize">Category Name</h2>
                    <span id="categoryCount" class="bg-gray-800 text-gray-300 text-sm px-3 py-1 rounded-full">0 items</span>
                </div>

                <div id="itemList" class="space-y-3">
                    <!-- Injected via JS -->
                </div>
            </div>

        </div>
    </main>

    <!-- Submit Order Modal -->
    <div id="orderModal" class="absolute inset-0 z-50 bg-black/80 flex flex-col items-center justify-center p-6 hidden">
        <div class="w-full max-w-md bg-falcone-gray p-6 rounded-2xl shadow-2xl border border-falcone-red/20">
            <h2 class="text-2xl font-bold text-white mb-6" id="labelOrderModalTitle">Submit Order</h2>

            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-400 mb-1" id="labelOrderDate">Order Date</label>
                    <input type="date" id="orderDateInput" class="w-full bg-black border border-gray-700 rounded-lg p-3 text-white focus:border-falcone-red outline-none">
                </div>

                <div class="flex items-center gap-3 py-2">
                    <input type="checkbox" id="rushOrderCheckbox" class="w-5 h-5 accent-falcone-red bg-black border-gray-700 rounded">
                    <label for="rushOrderCheckbox" class="text-white font-medium" id="labelRushOrder">Rush Order (Urgent)</label>
                </div>

                <div id="neededByContainer" class="hidden">
                    <label class="block text-sm text-falcone-red mb-1" id="labelNeededBy">Needed By Date</label>
                    <input type="date" id="neededByInput" class="w-full bg-black border border-falcone-red/50 rounded-lg p-3 text-white focus:border-falcone-red outline-none">
                </div>
            </div>

            <div id="orderModalError" class="text-falcone-red text-sm mt-4 hidden">Error message</div>

            <div class="flex justify-end gap-3 mt-8">
                <button id="btnCancelOrder" class="px-5 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-gray-800 transition-colors" id="labelCancel">Cancel</button>
                <button id="btnConfirmOrder" class="px-5 py-2 rounded-lg bg-falcone-red hover:bg-red-600 text-white font-bold transition-colors shadow-lg flex items-center gap-2">
                    <span id="labelConfirm">Confirm Order</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
