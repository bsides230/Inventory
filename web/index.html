<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Falcone's Pizza Inventory</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/icon-32.png">

    <!-- Tailwind CSS (via CDN like RemoDash) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        falcone: {
                            red: '#db594b',
                            dark: '#0a0a0a',
                            light: '#f2f2f2',
                            gray: '#1f1f1f'
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica Neue', 'Arial', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="/style.css">

    <!-- Register Service Worker -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then(registration => {
            console.log('SW registered: ', registration);
          }).catch(registrationError => {
            console.log('SW registration failed: ', registrationError);
          });
        });
      }
    </script>

    <!-- Heroicons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-falcone-dark text-white font-sans antialiased select-none h-screen flex flex-col overflow-hidden">

    <!-- Login Screen -->
    <div id="loginScreen" class="absolute inset-0 z-50 bg-falcone-dark flex flex-col items-center justify-center p-6 hidden">
        <div class="w-full max-w-md bg-falcone-gray p-8 rounded-2xl shadow-2xl border border-falcone-red/20">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-falcone-red mb-2">Falcone's Pizza</h1>
                <h2 class="text-xl text-gray-400" id="loginTitle">Inventory Login</h2>
            </div>

            <form id="loginForm" class="space-y-6">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-300 mb-2" id="labelUsername">Username</label>
                    <input type="text" id="username" name="username"
                        class="w-full px-4 py-3 bg-black border border-gray-700 rounded-xl focus:ring-2 focus:ring-falcone-red focus:border-transparent text-white placeholder-gray-500"
                        placeholder="e.g. kitchen" autocomplete="username">
                </div>

                <div>
                    <label for="pin" class="block text-sm font-medium text-gray-300 mb-2" id="labelPin">4-Digit PIN</label>
                    <input type="password" id="pin" name="pin" pattern="[0-9]*" inputmode="numeric" maxlength="4"
                        class="w-full px-4 py-3 bg-black border border-gray-700 rounded-xl focus:ring-2 focus:ring-falcone-red focus:border-transparent text-white placeholder-gray-500 text-center text-2xl tracking-[0.5em]"
                        placeholder="••••">
                </div>

                <div id="loginError" class="text-falcone-red text-sm text-center hidden">Invalid username or PIN</div>

                <button type="submit" class="w-full bg-falcone-red hover:bg-red-600 text-white font-bold py-4 px-4 rounded-xl transition-colors text-lg" id="btnLogin">
                    Login
                </button>
            </form>

            <div class="mt-6 text-center">
                <button id="btnToggleLangLogin" class="text-gray-400 hover:text-white text-sm flex items-center justify-center mx-auto gap-2">
                    <i data-lucide="globe" class="w-4 h-4"></i>
                    <span>Español</span>
                </button>
            </div>
        </div>
    </div>

    <!-- App Header -->
    <header class="bg-falcone-gray border-b border-gray-800 p-4 sticky top-0 z-40 shadow-md">
        <div class="flex justify-between items-center max-w-4xl mx-auto">
            <div class="flex items-center gap-3">
                <button id="btnBack" class="p-2 text-gray-400 hover:text-white hidden transition-colors rounded-lg active:bg-gray-800">
                    <i data-lucide="arrow-left" class="w-6 h-6"></i>
                </button>
                <h1 class="text-xl font-bold text-white tracking-tight" id="appTitle">Inventory</h1>
            </div>

            <div class="flex items-center gap-4">
                <div class="text-sm text-gray-400 hidden sm:block">
                    <span id="userGreeting">User</span>: <span id="currentUser" class="text-falcone-red font-semibold">Kitchen</span>
                </div>

                <button id="btnToggleLangApp" class="p-2 text-gray-400 hover:text-white transition-colors rounded-lg active:bg-gray-800" title="Toggle Language">
                    <i data-lucide="languages" class="w-6 h-6"></i>
                </button>

                <button id="btnLogout" class="p-2 text-falcone-red hover:text-red-400 transition-colors rounded-lg active:bg-gray-800" title="Logout">
                    <i data-lucide="log-out" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto p-4 md:p-6 pb-20 no-scrollbar">
        <div class="max-w-4xl mx-auto">

            <!-- Dashboard View (Category Grid) -->
            <div id="dashboardView" class="grid grid-cols-2 gap-4 md:gap-6 pb-8">
                <!-- Injected via JS -->
            </div>

            <!-- Category View (Item List) -->
            <div id="categoryView" class="hidden pb-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 id="categoryTitle" class="text-2xl font-bold text-falcone-red capitalize">Category Name</h2>
                    <span id="categoryCount" class="bg-gray-800 text-gray-300 text-sm px-3 py-1 rounded-full">0 items</span>
                </div>

                <div id="itemList" class="space-y-3">
                    <!-- Injected via JS -->
                </div>

                <div class="mt-8 pt-6 border-t border-gray-800 flex justify-end">
                    <button id="btnSaveInventory" class="bg-falcone-red hover:bg-red-600 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition-colors flex items-center gap-2">
                        <i data-lucide="save" class="w-5 h-5"></i>
                        <span id="labelSave">Save Changes</span>
                    </button>
                </div>
            </div>

        </div>
    </main>

    <!-- Scripts -->
    <script src="/app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
