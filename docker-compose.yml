services:
  api:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://inventory:inventory@db:5432/inventory}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set production origin}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - orders_data:/app/orders
      - logs_data:/app/logs
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_DB: inventory
      POSTGRES_USER: inventory
      POSTGRES_PASSWORD: inventory
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventory -d inventory"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  proxy:
    image: caddy:2
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  backup_worker:
    build: .
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://inventory:inventory@db:5432/inventory}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-3600}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - postgres_data:/var/lib/postgresql/data:ro
      - orders_data:/app/orders:ro
      - backups_data:/app/backups
    command: >
      bash -lc "while true; do
      ./scripts/backup.sh || true;
      sleep ${BACKUP_INTERVAL_SECONDS:-3600};
      done"
    restart: unless-stopped

volumes:
  postgres_data:
  orders_data:
  logs_data:
  backups_data:
  caddy_data:
  caddy_config:
