services:
  api:
    build: .
    env_file:
      - .env
    environment:
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:?set production origin}
    volumes:
      - orders_data:/app/orders
      - logs_data:/app/logs
      - ipc_data:/app/ipc
    restart: unless-stopped

  ipc_worker:
    build: .
    env_file:
      - .env
    volumes:
      - orders_data:/app/orders
      - logs_data:/app/logs
      - ipc_data:/app/ipc
    command: python services/ipc_worker.py
    restart: unless-stopped

  proxy:
    image: caddy:2
    depends_on:
      - api
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  backup_worker:
    build: .
    env_file:
      - .env
    environment:
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-3600}
    volumes:
      - orders_data:/app/orders:ro
      - backups_data:/app/backups
    command: >
      bash -lc "while true; do
      ./scripts/backup.sh || true;
      sleep ${BACKUP_INTERVAL_SECONDS:-3600};
      done"
    restart: unless-stopped

volumes:
  orders_data:
  logs_data:
  ipc_data:
  backups_data:
  caddy_data:
  caddy_config:
